name: codeql

# Scans the repository's GitHub Actions workflows for misconfiguration.
# (There is no application code on this static site, so "actions" is the only
# meaningful CodeQL target here.)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze Actions
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        # actions/checkout@v4
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Initialize CodeQL
        # github/codeql-action/init@v3
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357
        with:
          languages: actions

      - name: Perform CodeQL Analysis
        # github/codeql-action/analyze@v3
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357
