name: build-check

# Validates that the site builds and the generated HTML is sound.
# Does NOT deploy — GitHub Pages keeps building from the main branch itself.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Jekyll build + HTMLProofer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Ruby
        # ruby/setup-ruby@v1
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Validate HTML
        run: |
          gem install html-proofer
          htmlproofer ./_site \
            --disable-external \
            --allow-hash-href \
            --ignore-empty-alt
