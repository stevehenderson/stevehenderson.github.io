name: build-check

# Validates that the site builds and the generated HTML is sound.
# Does NOT deploy — GitHub Pages keeps building from the main branch itself.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Jekyll build + HTMLProofer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v4
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Set up Ruby
        # ruby/setup-ruby@v1
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Validate HTML
        run: |
          gem install html-proofer
          htmlproofer ./_site \
            --disable-external \
            --allow-hash-href \
            --ignore-empty-alt
